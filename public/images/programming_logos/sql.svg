<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#4F9CF9"/>
      <stop offset="100%" stop-color="#1E40AF"/>
    </linearGradient>
    <linearGradient id="top" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#93C5FD"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
  </defs>

  <!-- Cylinder body -->
  <path d="M20 28 Q20 18 64 18 Q108 18 108 28 L108 100 Q108 110 64 110 Q20 110 20 100 Z"
        fill="url(#body)"/>

  <!-- Mid disc rings -->
  <ellipse cx="64" cy="52" rx="44" ry="10" fill="none" stroke="#1E3A8A" stroke-width="2" opacity="0.55"/>
  <ellipse cx="64" cy="76" rx="44" ry="10" fill="none" stroke="#1E3A8A" stroke-width="2" opacity="0.55"/>

  <!-- Top disc -->
  <ellipse cx="64" cy="28" rx="44" ry="10" fill="url(#top)" stroke="#1E3A8A" stroke-width="2"/>

  <!-- Top highlight -->
  <ellipse cx="50" cy="24" rx="18" ry="3" fill="#DBEAFE" opacity="0.7"/>

  <!-- SQL text -->
  <text x="64" y="93" text-anchor="middle"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-weight="700" font-size="22" fill="#FFFFFF" letter-spacing="1.5">SQL</text>
</svg>
